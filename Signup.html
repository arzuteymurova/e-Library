<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeydiyyat</title>
</head>

<body bgcolor="bisque" text="brown">
    <div>
        <h1>Qeydiyyat</h1>
        <p>Səhifəyə üzv olmaq üçün qeydiyyat formunu doldurun.

    </div>

    <form>
        <div>
            <div>
                <label for="email">E-mail ünvanınız</label>
            </div>
            <div>
                <input type="text" name="email" value="" />
            </div>
        </div>
        <div>
            <div>
                <label for="username">İstifadəçi adı seçin</label>
            </div>
            <div>
                <input autocapitalize="off" type="text" name="username">
                
            </div>
        </div>

        <div>
            <div>
                <label for="password">Şifrə seçin</label>
            </div>
            <div>
                <input type="password" name="password" />
            </div>
        </div>
        <div>
            <div>
                <label for="password2">Şifrəni təsdiqləyin</label>
            </div>
            <div>
                <input type="password" name="password2"/>
            </div>
        </div>
        <div>
            <br />
            <button type="submit" name="signup">Qeydiyyatdan keçin</button>
        </div>

        <br />
        <hr color="brown">

</body>

</html>
